<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Circle background -->
  <circle cx="100" cy="100" r="95" fill="#8B9B6F" stroke="#708560" stroke-width="3"/>
  
  <!-- Potato body -->
  <ellipse cx="100" cy="105" rx="45" ry="50" fill="#D4A574" stroke="#8B6F47" stroke-width="2"/>
  
  <!-- Potato highlights -->
  <ellipse cx="80" cy="85" rx="8" ry="12" fill="#E8C4A0" opacity="0.7"/>
  <ellipse cx="110" cy="75" rx="6" ry="10" fill="#E8C4A0" opacity="0.7"/>
  <ellipse cx="95" cy="140" rx="5" ry="8" fill="#C99A5C" opacity="0.6"/>
  
  <!-- Eyes -->
  <circle cx="85" cy="95" r="6" fill="#3D2817"/>
  <circle cx="115" cy="95" r="6" fill="#3D2817"/>
  <circle cx="87" cy="93" r="2" fill="#FFFFFF"/>
  <circle cx="117" cy="93" r="2" fill="#FFFFFF"/>
  
  <!-- Smile -->
  <path d="M 85 110 Q 100 120 115 110" stroke="#3D2817" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <ellipse cx="100" cy="105" rx="3" ry="4" fill="#3D2817"/>
  
  <!-- Carrot on left -->
  <g>
    <polygon points="50,110 40,100 45,115" fill="#E8654B"/>
    <polygon points="50,110 42,105 46,113" fill="#F0845A"/>
  </g>
  
  <!-- Cabbage on right -->
  <g>
    <circle cx="140" cy="100" r="12" fill="#6DB366"/>
    <circle cx="135" cy="100" r="8" fill="#7DC972"/>
    <circle cx="145" cy="100" r="8" fill="#7DC972"/>
    <circle cx="140" cy="95" r="7" fill="#7DC972"/>
    <circle cx="140" cy="105" r="7" fill="#7DC972"/>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="70" cy="60" r="3" fill="#708560" opacity="0.6"/>
  <circle cx="130" cy="55" r="3" fill="#708560" opacity="0.6"/>
  <circle cx="65" cy="150" r="2.5" fill="#708560" opacity="0.5"/>
  <circle cx="135" cy="155" r="2.5" fill="#708560" opacity="0.5"/>
</svg>